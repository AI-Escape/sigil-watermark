name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: "pyproject.toml"
      - run: uv sync --extra docs
      - run: uv run mkdocs gh-deploy --force
